name: Claude Code
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code with OpenRouter
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          # Pass OpenRouter key to the action's ANTHROPIC_API_KEY input.
          # The action will use this for the ANTHROPIC_AUTH_TOKEN env var.
          anthropic_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          # Use specific OpenRouter model aliases as needed
          model: "stepfun/step-3.5-flash:free"
        env:
          # Set the OpenRouter API base URL using the ANTHROPIC_BASE_URL env var
          ANTHROPIC_BASE_URL: "https://openrouter.ai/api"
          # Explicitly blank out the default ANTHROPIC_API_KEY in environment variables
          ANTHROPIC_API_KEY: ""
